pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/
    - cp *.png public/ 2>/dev/null || true
    - cp *.svg public/ 2>/dev/null || true
    - cp *.pdf public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
